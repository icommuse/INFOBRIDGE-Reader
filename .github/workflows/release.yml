name: Release INFOBRIDGE Reader

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Clean Distribution Zip
        run: |
          VERSION=${GITHUB_REF_NAME}
          ZIP_NAME="INFOBRIDGE-Reader-${VERSION}.zip"
          # Zip only the necessary files for the PWA utility
          zip -r $ZIP_NAME index.html sw.js manifest.json images/ README.md TROUBLESHOOTING.txt LICENSE
          echo "ZIP_PATH=$ZIP_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_PATH }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
